version: '3.9'
services:
  mongodb:
    image: mongo:7.0
    container_name: skillswap-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: skillswap-connect

  backend:
    build:
      context: ./backend
    container_name: skillswap-backend
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/skillswap-connect
      - JWT_SECRET=your_super_secret_jwt_key_change_in_production
      - PORT=5000
    depends_on:
      - mongodb

  frontend:
    build:
      context: ./frontend
    container_name: skillswap-frontend
    ports:
      - "5173:5173"
    environment:
      - PORT=5173
      - VITE_API_URL=/api
      - VITE_PROXY_TARGET=http://backend:5000
    depends_on:
      - backend

volumes:
  mongo-data:
    name: skillswap-mongo-data
